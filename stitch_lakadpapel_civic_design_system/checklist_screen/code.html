<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed": "#ffdcc3",
                      "primary-container": "#b15f00",
                      "tertiary-fixed": "#7ffc97",
                      "on-tertiary-fixed": "#002109",
                      "inverse-primary": "#ffb77d",
                      "background-paper": "#F7F4EF",
                      "on-secondary-fixed": "#001f28",
                      "surface-tint": "#904d00",
                      "tertiary-fixed-dim": "#62df7d",
                      "outline-variant": "#dbc2b0",
                      "on-surface": "#1f1b17",
                      "surface-container-high": "#f0e6e0",
                      "surface-dim": "#e2d8d2",
                      "surface-container-lowest": "#ffffff",
                      "on-background": "#1f1b17",
                      "on-secondary-container": "#006077",
                      "surface-container-low": "#fcf2eb",
                      "border-subtle": "#E8E0D5",
                      "on-secondary": "#ffffff",
                      "background": "#fff8f5",
                      "on-tertiary": "#ffffff",
                      "error": "#ba1a1a",
                      "on-surface-variant": "#554336",
                      "surface-container": "#f6ece6",
                      "on-primary": "#ffffff",
                      "on-primary-fixed": "#2f1500",
                      "on-tertiary-container": "#f7fff2",
                      "primary": "#8d4b00",
                      "state-locked": "#CBD5E1",
                      "warning-bg": "#FEF3C7",
                      "secondary": "#006780",
                      "on-primary-container": "#fffbff",
                      "surface-container-highest": "#eae1da",
                      "primary-fixed-dim": "#ffb77d",
                      "tertiary": "#006b2c",
                      "on-tertiary-fixed-variant": "#005320",
                      "on-error-container": "#93000a",
                      "outline": "#887364",
                      "secondary-fixed-dim": "#6cd3f7",
                      "surface-variant": "#eae1da",
                      "surface-card": "#FFFFFF",
                      "secondary-container": "#76dcff",
                      "on-error": "#ffffff",
                      "tertiary-container": "#00873a",
                      "on-secondary-fixed-variant": "#004e61",
                      "inverse-on-surface": "#f9efe8",
                      "secondary-fixed": "#b7eaff",
                      "surface": "#fff8f5",
                      "on-primary-fixed-variant": "#6e3900",
                      "inverse-surface": "#342f2b",
                      "error-container": "#ffdad6",
                      "surface-bright": "#fff8f5"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base-unit": "8px",
                      "margin-horizontal": "20px",
                      "section-gap": "24px",
                      "card-padding": "16px",
                      "stack-gap": "12px"
              },
              "fontFamily": {
                      "page-title": ["Inter"],
                      "metadata": ["Inter"],
                      "label-caps": ["Inter"],
                      "card-title": ["Inter"],
                      "body-main": ["Inter"]
              },
              "fontSize": {
                      "page-title": ["22px", {"lineHeight": "28px", "fontWeight": "700"}],
                      "metadata": ["12px", {"lineHeight": "16px", "fontWeight": "400"}],
                      "label-caps": ["11px", {"lineHeight": "14px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "card-title": ["15px", {"lineHeight": "20px", "fontWeight": "600"}],
                      "body-main": ["13px", {"lineHeight": "18px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
<style>
        body { background-color: #F7F4EF; font-family: 'Inter', sans-serif; }
        .active-scale:active { transform: scale(0.96); transition: transform 0.1s ease-in-out; }
        .skeleton-shimmer {
            background: linear-gradient(90deg, #f0e6e0 25%, #fcf2eb 50%, #f0e6e0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen pb-32">
<!-- Top AppBar -->
<header class="bg-surface dark:bg-surface-dim sticky top-0 z-40 px-margin-horizontal h-16 flex items-center justify-between">
<div class="w-10"></div> <!-- Spacer for centering -->
<h1 class="font-page-title text-page-title font-bold text-primary dark:text-primary-fixed-dim">LakadPapel</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors active-scale">
<span class="material-symbols-outlined text-on-surface-variant">notifications</span>
</button>
</header>
<main class="max-w-md mx-auto px-margin-horizontal pt-4">
<!-- Toggle Switcher -->
<div class="bg-surface-container-low rounded-full p-1 flex mb-6 border border-border-subtle">
<button class="flex-1 py-2 rounded-full font-label-caps text-label-caps bg-primary text-on-primary shadow-sm transition-all">
                Simple
            </button>
<button class="flex-1 py-2 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:bg-surface-container-high transition-all">
                Advanced
            </button>
</div>
<!-- Search Bar -->
<div class="relative mb-8">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
<input class="w-full h-12 bg-[#F1EDE8] border-none rounded-xl pl-12 pr-4 font-body-main text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary/20" placeholder="Hanapin ang dokumento…" type="text"/>
</div>
<!-- Section: PUNDASYON -->
<section class="mb-section-gap">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-4 tracking-widest uppercase">PUNDASYON</h2>
<div class="space-y-stack-gap">
<!-- Card: PSA Birth Certificate -->
<div class="bg-surface-card border border-border-subtle rounded-xl p-card-padding flex items-center shadow-sm active-scale cursor-pointer">
<div class="w-10 h-10 rounded-full bg-tertiary-fixed flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<div class="flex-1">
<h3 class="font-card-title text-card-title text-on-surface">PSA Birth Certificate</h3>
<p class="font-metadata text-metadata text-on-surface-variant">Handa na at Beripikado</p>
</div>
<div class="w-3 h-3 rounded-full bg-tertiary"></div>
</div>
</div>
</section>
<!-- Section: PANGUNAHING ID -->
<section class="mb-section-gap">
<h2 class="font-label-caps text-label-caps text-on-surface-variant mb-4 tracking-widest uppercase">PANGUNAHING ID</h2>
<div class="space-y-stack-gap">
<!-- Card: PhilSys National ID -->
<div class="bg-surface-card border border-border-subtle rounded-xl p-card-padding flex items-center shadow-sm active-scale cursor-pointer">
<div class="w-10 h-10 rounded-full bg-secondary-container/30 border border-secondary flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-secondary">badge</span>
</div>
<div class="flex-1">
<h3 class="font-card-title text-card-title text-on-surface">PhilSys National ID</h3>
<p class="font-metadata text-metadata text-on-surface-variant">Kailangan ng aplikasyon</p>
</div>
<div class="w-3 h-3 rounded-full bg-secondary"></div>
</div>
<!-- Card: Voter's ID -->
<div class="bg-surface-card border border-border-subtle rounded-xl p-card-padding flex items-center shadow-sm active-scale cursor-pointer">
<div class="w-10 h-10 rounded-full bg-surface-container-highest border border-outline-variant flex items-center justify-center mr-4">
<span class="material-symbols-outlined text-on-surface-variant">how_to_reg</span>
</div>
<div class="flex-1">
<h3 class="font-card-title text-card-title text-on-surface">Voter's ID</h3>
<p class="font-metadata text-metadata text-on-surface-variant">Hindi pa nakuha</p>
</div>
<div class="w-3 h-3 rounded-full bg-outline"></div>
</div>
</div>
</section>
<!-- Skeleton Loading Section -->
<section class="opacity-60">
<div class="space-y-stack-gap">
<div class="bg-surface-card border border-border-subtle rounded-xl p-card-padding flex items-center shadow-sm">
<div class="w-10 h-10 rounded-full skeleton-shimmer mr-4"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-32 skeleton-shimmer rounded"></div>
<div class="h-3 w-20 skeleton-shimmer rounded"></div>
</div>
</div>
<div class="bg-surface-card border border-border-subtle rounded-xl p-card-padding flex items-center shadow-sm">
<div class="w-10 h-10 rounded-full skeleton-shimmer mr-4"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-40 skeleton-shimmer rounded"></div>
<div class="h-3 w-24 skeleton-shimmer rounded"></div>
</div>
</div>
</div>
</section>
</main>
<!-- Sticky Primary Button -->
<div class="fixed bottom-24 left-0 right-0 px-margin-horizontal flex justify-center pointer-events-none">
<button class="pointer-events-auto bg-primary text-on-primary font-card-title text-card-title px-8 py-4 rounded-full shadow-lg active-scale flex items-center gap-2">
<span class="material-symbols-outlined">description</span>
            Hanapin ang Target na Dokumento
        </button>
</div>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center bg-surface px-2 pb-safe h-16 border-t border-border-subtle">
<div class="flex flex-col items-center justify-center text-primary border-t-2 border-primary pt-2 pb-1 active-scale cursor-pointer">
<span class="material-symbols-outlined" data-icon="description">description</span>
<span class="font-label-caps text-label-caps">Docs</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant pt-2 pb-1 hover:bg-surface-container-high transition-all active-scale cursor-pointer">
<span class="material-symbols-outlined" data-icon="badge">badge</span>
<span class="font-label-caps text-label-caps">Find ID</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant pt-2 pb-1 hover:bg-surface-container-high transition-all active-scale cursor-pointer">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label-caps text-label-caps">Roadmap</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant pt-2 pb-1 hover:bg-surface-container-high transition-all active-scale cursor-pointer">
<span class="material-symbols-outlined" data-icon="explore">explore</span>
<span class="font-label-caps text-label-caps">Explorer</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant pt-2 pb-1 hover:bg-surface-container-high transition-all active-scale cursor-pointer">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
<span class="font-label-caps text-label-caps">Higit Pa</span>
</div>
</nav>
<script>
        // Simple Interaction logic for toggle
        const toggleButtons = document.querySelectorAll('.bg-surface-container-low button');
        toggleButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                toggleButtons.forEach(b => {
                    b.classList.remove('bg-primary', 'text-on-primary', 'shadow-sm');
                    b.classList.add('text-on-surface-variant');
                });
                btn.classList.add('bg-primary', 'text-on-primary', 'shadow-sm');
                btn.classList.remove('text-on-surface-variant');
            });
        });
    </script>
</body></html>
